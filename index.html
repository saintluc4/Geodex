<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoDex Atlas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Raleway:ital,wght@0,300;0,400;0,600;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="stars"></canvas>
<div class="hex-grid-bg"></div>
<div class="scanline-overlay"></div>
<div class="vignette"></div>

<header>
  <div class="header-inner">
    <div class="header-eyebrow">
      <span class="eyebrow-line"></span>
      <span>Sistema de Monitoramento Global · Pokémon × Clima Real</span>
      <span class="eyebrow-line"></span>
    </div>
    <div class="h1-wrap">
      <h1>GEO<em>DEX</em></h1>
      <div class="h1-sub-wrap">
        <span class="h1-rule"></span>
        <span class="h1-atlas">ATLAS</span>
        <span class="h1-rule"></span>
      </div>
    </div>
    <p class="header-sub">Onde o mundo real encontra o mundo Pokémon</p>
    <div class="header-stats">
      <div class="stat-item">
        <span class="stat-num">IX</span>
        <span class="stat-label">Gerações</span>
      </div>
      <div class="stat-divider">◆</div>
      <div class="stat-item">
        <span class="stat-num dot-live">●</span>
        <span class="stat-label">Clima ao vivo</span>
      </div>
      <div class="stat-divider">◆</div>
      <div class="stat-item">
        <span class="stat-num">1008+</span>
        <span class="stat-label">Pokémon</span>
      </div>
    </div>
  </div>
</header>

<main>

  <div class="controls-container">
    <button class="btn-geo" onclick="geolocateUser()">
      <span class="btn-geo-icon">◎</span>
      <span>Minha Localização</span>
    </button>
    <div class="search-box">
      <span class="search-prefix">⌕</span>
      <input id="pokeSearchInput" type="text"
        placeholder="ex: pikachu, charizard, mewtwo..."
        onkeydown="if(event.key==='Enter') globalSearch()">
      <button id="searchBtn" onclick="globalSearch()">Buscar</button>
    </div>
  </div>

  <div id="search-result"></div>

  <div class="section-label">
    <span class="sl-line"></span>
    <span>Regiões Monitoradas</span>
    <span class="sl-line"></span>
  </div>

  <div class="regions-grid" id="regions-grid"></div>

  <div id="detail-panel">
    <div class="detail-topbar">
      <div class="detail-breadcrumb">
        <span class="bc-icon">◀</span> Regiões do Mundo
      </div>
      <button class="close-detail" onclick="closeDetail()">✕ Fechar Painel</button>
    </div>
    <div id="detail-content"></div>
  </div>

</main>

<footer>
  <div class="footer-inner">
    <span class="footer-logo">GeoDex<strong>Atlas</strong></span>
    <span class="footer-sep">·</span>
    <span class="footer-copy">Clima via Open-Meteo · Pokémon via PokéAPI</span>
  </div>
</footer>

<script src="script.js"></script>
</body>
</html>
